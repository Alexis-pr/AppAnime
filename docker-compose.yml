services:
  appanime:
    build: .
    ports:
      - "8083:8080"
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: mysql-anime
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Admin
      MYSQL_DATABASE: appanime
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: